name: Playtest Artifact Gate

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playtest-artifact-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  artifact-gate:
    name: Build and scan playtest artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build and scan deployable playtest artifact
        run: scripts/ci_playtest_artifact_gate.sh
